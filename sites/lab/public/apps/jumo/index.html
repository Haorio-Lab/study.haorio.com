<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>주모용 삑삑이</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Jumo Flashcard Prototype</p>
          <h1>주모용 삑삑이</h1>
          <p id="sourceText" class="source-text"></p>
        </div>
        <div class="counter" id="counterText">0 / 0</div>
      </header>

      <div class="study-layout">
        <article class="card">
          <div class="card-meta">
            <span id="fileBadge">-</span>
            <span id="sheetBadge">-</span>
            <span id="intentBadge">-</span>
            <span id="timerText">수동</span>
          </div>

          <div class="topic-nav" aria-label="카드 이동">
            <button id="prevButton" type="button" aria-label="이전 카드">‹</button>
            <button id="shuffleButton" type="button">다시 섞기</button>
            <button id="nextButton" type="button" aria-label="다음 카드">›</button>
          </div>

          <h2 id="questionText"></h2>
          <p id="knownProgressText" class="known-progress">로그인하면 아는 카드가 저장됩니다.</p>

          <div class="card-tools">
            <section class="account-panel" aria-label="학습 계정" hidden>
              <div class="account-status">
                <strong>학습 계정</strong>
                <p id="userStatusText">계정 없이 전체 카드 보기</p>
              </div>
              <form id="userCreateForm" class="login-form">
                <label>
                  <span>사용자 이름</span>
                  <input id="userNameInput" type="text" autocomplete="nickname" placeholder="예: Henry" />
                </label>
                <button type="submit">계정 만들기 / 로그인</button>
              </form>
              <button id="userLogoutButton" type="button" hidden>로그아웃</button>
              <div class="quick-login-wrap">
                <span>빠른 로그인</span>
                <div id="quickLoginList" class="quick-login-list"></div>
              </div>
              <p id="userMessage" class="user-message" role="status"></p>
            </section>

            <section class="controls" aria-label="카드 컨트롤">
              <label class="file-field">
                <span>파일</span>
                <select id="fileSelect"></select>
              </label>
              <label>
                <span>출제 방식</span>
                <select id="orderSelect">
                  <option value="sequential">순차</option>
                  <option value="random">랜덤</option>
                </select>
              </label>
              <label>
                <span>카드 보기</span>
                <select id="cardVisibilitySelect">
                  <option value="unknown">모르는 카드만</option>
                  <option value="all">전체 카드</option>
                </select>
              </label>
              <label>
                <span>자동 넘김 <strong id="intervalLabel">30초</strong></span>
                <input id="intervalInput" type="range" min="10" max="100" step="5" value="30" />
              </label>
              <button id="autoButton" type="button" aria-pressed="false">자동</button>
              <button id="countdownButton" type="button" aria-pressed="true">3초 카운트</button>
              <button id="answerButton" type="button">답안 열기</button>
              <button id="pinAnswerButton" type="button" aria-pressed="false">답안 고정</button>
              <button id="knownButton" type="button" aria-pressed="false">아는 카드</button>
            </section>
          </div>
        </article>

        <section id="answerPanel" class="answer-panel is-hidden" aria-label="답안">
          <div class="answer-head">
            <h3>목차 / 답안</h3>
            <span id="sectionCountText"></span>
          </div>
          <div id="sectionsList" class="sections-list"></div>
        </section>
      </div>

      <footer class="shortcut-guide">
        <span><kbd>←</kbd> <kbd>→ / Space</kbd> 이동</span>
        <span><kbd>↑</kbd> 답안 열기</span>
        <span><kbd>↓</kbd> 아는 카드 체크</span>
      </footer>
    </main>

    <dialog id="imageDialog" class="image-dialog">
      <button id="closeDialogButton" class="dialog-close" type="button" aria-label="닫기">×</button>
      <img id="dialogImage" alt="" />
    </dialog>

    <script src="./data.js"></script>
    <script src="../study-progress-client.js"></script>
    <script src="../remote-input.js?v=touch-scroll-2"></script>
    <script src="./app.js"></script>
  </body>
</html>
